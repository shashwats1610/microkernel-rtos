name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - sched_demo
          - mutex_demo
          - stress_test
          - test_scheduler
          - test_mutex
          - test_priority_inheritance
          - test_msgqueue
          - test_semaphore
          - test_timeout
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm
      - name: Build ${{ matrix.app }}
        run: make APP=${{ matrix.app }} all

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi qemu-system-arm python3
      - name: Run firmware tests
        run: make test-all
