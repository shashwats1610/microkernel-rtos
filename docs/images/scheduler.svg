<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200">
  <rect width="480" height="200" fill="#f8f9fa"/>
  <text x="20" y="30" font-family="sans-serif" font-size="14" font-weight="bold">Scheduler: 8 priority buckets</text>
  <rect x="20" y="50" width="60" height="40" fill="#4a90d9" stroke="#333"/>
  <text x="35" y="75" font-family="sans-serif" font-size="11" fill="#fff">B0 hi</text>
  <rect x="100" y="50" width="60" height="40" fill="#7ab" stroke="#333"/>
  <text x="125" y="75" font-family="sans-serif" font-size="11">...</text>
  <rect x="180" y="50" width="60" height="40" fill="#888" stroke="#333"/>
  <text x="195" y="75" font-family="sans-serif" font-size="11" fill="#fff">B7 lo</text>
  <text x="20" y="120" font-family="sans-serif" font-size="12">Each bucket: circular TCB ring (next_ready)</text>
  <text x="20" y="145" font-family="sans-serif" font-size="12">scheduler_get_next: scan 0..7, take head, rotate</text>
  <text x="20" y="170" font-family="sans-serif" font-size="12">Time slice: SysTick expires slice, PendSV if peers exist</text>
</svg>
